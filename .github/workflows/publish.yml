name: Release Validation

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  release-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Validate Maven publications for JitPack
        run: |
          ./gradlew :redbytefx-core:publishReleasePublicationToMavenLocal \
            :redbytefx-compose:publishReleasePublicationToMavenLocal \
            :redbytefx-stdlib:publishReleasePublicationToMavenLocal
